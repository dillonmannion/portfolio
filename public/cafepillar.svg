<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C9F5B"/>
      <stop offset="100%" stop-color="#4a7a3a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#87CEAB"/>
  <!-- Ground -->
  <rect x="0" y="480" width="1280" height="240" fill="url(#grass)"/>
  <!-- Path -->
  <path d="M0,520 Q320,490 640,520 Q960,550 1280,510" stroke="#8B7355" stroke-width="40" fill="none" opacity="0.4"/>
  <!-- Caterpillar body segments -->
  <g transform="translate(440, 420)">
    <circle cx="0" cy="0" r="35" fill="#7EC87E"/>
    <circle cx="55" cy="-8" r="35" fill="#8AD88A"/>
    <circle cx="110" cy="-12" r="35" fill="#7EC87E"/>
    <circle cx="165" cy="-8" r="35" fill="#8AD88A"/>
    <circle cx="220" cy="0" r="40" fill="#6CB86C"/>
    <!-- Face -->
    <circle cx="232" cy="-12" r="6" fill="#333"/>
    <circle cx="248" cy="-12" r="6" fill="#333"/>
    <path d="M232,-2 Q240,6 248,-2" stroke="#333" stroke-width="2.5" fill="none"/>
    <!-- Antennae -->
    <line x1="235" y1="-38" x2="225" y2="-60" stroke="#333" stroke-width="2.5"/>
    <circle cx="225" cy="-63" r="5" fill="#FF6B6B"/>
    <line x1="245" y1="-38" x2="255" y2="-60" stroke="#333" stroke-width="2.5"/>
    <circle cx="255" cy="-63" r="5" fill="#FF6B6B"/>
    <!-- Chef hat -->
    <ellipse cx="240" cy="-55" rx="22" ry="8" fill="white"/>
    <rect x="222" y="-75" width="36" height="22" fill="white" rx="10"/>
  </g>
  <!-- Floating food items -->
  <g opacity="0.6">
    <!-- Coffee cup -->
    <rect x="180" y="300" width="30" height="35" fill="#8B6914" rx="3"/>
    <path d="M210,310 Q225,315 210,330" stroke="#8B6914" stroke-width="3" fill="none"/>
    <path d="M188,295 Q195,280 202,295" stroke="#aaa" stroke-width="2" fill="none"/>
    <!-- Cake -->
    <rect x="950" y="310" width="45" height="30" fill="#F4A460" rx="3"/>
    <rect x="945" y="305" width="55" height="10" fill="#FF69B4" rx="3"/>
    <rect x="968" y="285" width="8" height="22" fill="#FF6347"/>
    <circle cx="972" cy="282" r="6" fill="#FFD700"/>
  </g>
  <!-- Title -->
  <text x="640" y="640" text-anchor="middle" font-family="'Comic Sans MS', cursive, sans-serif" font-size="52" fill="#2d5a2d" letter-spacing="3">CAFEPILLAR</text>
  <text x="640" y="680" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2d5a2d" opacity="0.6" letter-spacing="2">A GODOT GAME PROJECT</text>
</svg>
