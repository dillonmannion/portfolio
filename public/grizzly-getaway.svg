<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="60%" stop-color="#2d5a7b"/>
      <stop offset="100%" stop-color="#4a8ab5"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ba4b8"/>
      <stop offset="100%" stop-color="#6b8a9e"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0f5"/>
      <stop offset="100%" stop-color="#c5d6e3"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#sky)"/>
  <!-- Mountains -->
  <polygon points="0,500 200,280 400,420 550,250 750,400 900,300 1100,380 1280,320 1280,500" fill="url(#mountain)"/>
  <polygon points="100,340 250,280 350,320 200,280" fill="url(#snow)" opacity="0.7"/>
  <polygon points="500,290 550,250 620,300" fill="url(#snow)" opacity="0.7"/>
  <polygon points="850,340 900,300 970,350" fill="url(#snow)" opacity="0.7"/>
  <!-- Trees -->
  <g fill="#2a4a3a" opacity="0.8">
    <polygon points="100,500 115,420 130,500"/>
    <polygon points="160,500 175,430 190,500"/>
    <polygon points="220,500 240,400 260,500"/>
    <polygon points="1050,500 1070,410 1090,500"/>
    <polygon points="1120,500 1135,430 1150,500"/>
    <polygon points="1180,500 1200,390 1220,500"/>
  </g>
  <!-- Cabin -->
  <rect x="520" y="440" width="240" height="100" fill="#5a3a2a" rx="2"/>
  <polygon points="500,445 640,370 780,445" fill="#3a2518"/>
  <rect x="560" y="470" width="40" height="40" fill="#f5d680" opacity="0.8" rx="1"/>
  <rect x="680" y="470" width="40" height="40" fill="#f5d680" opacity="0.8" rx="1"/>
  <rect x="620" y="490" width="30" height="50" fill="#3a2518" rx="1"/>
  <!-- Ground -->
  <rect x="0" y="540" width="1280" height="180" fill="#2a4a3a" opacity="0.6"/>
  <!-- Title -->
  <text x="640" y="650" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="white" opacity="0.9" letter-spacing="4">GRIZZLY GETAWAY</text>
  <text x="640" y="690" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="white" opacity="0.6" letter-spacing="2">Big Bear Lake, CA</text>
</svg>
