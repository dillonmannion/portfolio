<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="120" fill="#e94560" opacity="0.08"/>
  <circle cx="1080" cy="550" r="180" fill="#e94560" opacity="0.06"/>
  <circle cx="640" cy="360" r="250" fill="#e94560" opacity="0.04"/>
  <!-- Scissors icon -->
  <g transform="translate(580, 240) scale(1.5)" stroke="#e94560" stroke-width="2.5" fill="none" opacity="0.5">
    <circle cx="20" cy="20" r="12"/>
    <circle cx="60" cy="20" r="12"/>
    <line x1="32" y1="20" x2="48" y2="20"/>
    <line x1="25" y1="30" x2="55" y2="60"/>
    <line x1="55" y1="30" x2="25" y2="60"/>
  </g>
  <!-- Title -->
  <text x="640" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="56" fill="white" opacity="0.9" letter-spacing="6">PICASSO</text>
  <text x="640" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#e94560" opacity="0.7" letter-spacing="8">HAIR SALON</text>
  <!-- Divider -->
  <line x1="480" y1="550" x2="800" y2="550" stroke="#e94560" stroke-width="1" opacity="0.3"/>
  <text x="640" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.4" letter-spacing="3">BOOKING &amp; MANAGEMENT PLATFORM</text>
</svg>
