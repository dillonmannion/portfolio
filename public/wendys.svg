<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Red circular background -->
  <circle cx="20" cy="20" r="20" fill="#E2203A"/>
  <!-- Inner ring for old-fashioned feel -->
  <circle cx="20" cy="20" r="17" fill="none" stroke="#fff" stroke-width="1" opacity="0.35"/>
  <!-- Square burger patty — Wendy's signature -->
  <rect x="12" y="14" width="16" height="12" rx="1.5" fill="#8B2500" opacity="0.85"/>
  <!-- Bun top — rounded -->
  <path d="M11 15 Q11 9 20 9 Q29 9 29 15 Z" fill="#D4943A"/>
  <!-- Bun bottom — flat -->
  <rect x="11" y="25" width="18" height="3.5" rx="1.5" fill="#D4943A"/>
  <!-- Lettuce edge peeking out -->
  <path d="M11 14.5 Q14 16.5 17 14.5 Q20 16.5 23 14.5 Q26 16.5 29 14.5" fill="none" stroke="#4CAF50" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Sesame seeds on bun -->
  <ellipse cx="17" cy="11" rx="1" ry="0.6" fill="#F5DEB3" opacity="0.7" transform="rotate(-15 17 11)"/>
  <ellipse cx="22" cy="10.5" rx="1" ry="0.6" fill="#F5DEB3" opacity="0.7" transform="rotate(10 22 10.5)"/>
  <!-- Stylized W at bottom -->
  <text x="20" y="36" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="7" fill="white" opacity="0.9">W</text>
</svg>
