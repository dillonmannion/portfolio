<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="felt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a472a"/>
      <stop offset="100%" stop-color="#0d2818"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#felt)"/>
  <!-- Subtle grid lines (fantasy draft board) -->
  <g stroke="#2a6040" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="256" y1="0" x2="256" y2="720"/>
    <line x1="512" y1="0" x2="512" y2="720"/>
    <line x1="768" y1="0" x2="768" y2="720"/>
    <line x1="1024" y1="0" x2="1024" y2="720"/>
  </g>
  <!-- Decorative card shapes -->
  <g opacity="0.15">
    <rect x="100" y="200" width="120" height="170" rx="8" fill="#c4a44a" transform="rotate(-8 160 285)"/>
    <rect x="300" y="180" width="120" height="170" rx="8" fill="#c4a44a" transform="rotate(5 360 265)"/>
    <rect x="850" y="220" width="120" height="170" rx="8" fill="#c4a44a" transform="rotate(12 910 305)"/>
    <rect x="1050" y="190" width="120" height="170" rx="8" fill="#c4a44a" transform="rotate(-6 1110 275)"/>
  </g>
  <!-- Stats bars -->
  <g opacity="0.2">
    <rect x="440" y="250" width="180" height="8" rx="4" fill="#c4a44a"/>
    <rect x="440" y="270" width="140" height="8" rx="4" fill="#c4a44a"/>
    <rect x="440" y="290" width="200" height="8" rx="4" fill="#c4a44a"/>
    <rect x="440" y="310" width="160" height="8" rx="4" fill="#c4a44a"/>
  </g>
  <!-- Title -->
  <text x="640" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="72" fill="#c4a44a" opacity="0.9" letter-spacing="8">QUANTASY</text>
  <line x1="400" y1="530" x2="880" y2="530" stroke="#c4a44a" stroke-width="1" opacity="0.3"/>
  <text x="640" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#c4a44a" opacity="0.5" letter-spacing="6">FANTASY FOOTBALL ANALYTICS</text>
</svg>
