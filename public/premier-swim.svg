<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0096C7"/>
      <stop offset="100%" stop-color="#023E8A"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="20" cy="20" r="20"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="20" cy="20" r="20" fill="url(#bg)"/>
  <g clip-path="url(#circle)">
    <!-- Lane lines (subtle vertical dashes) -->
    <g stroke="#48CAE4" stroke-width="0.6" opacity="0.25" stroke-dasharray="2 3">
      <line x1="10" y1="0" x2="10" y2="40"/>
      <line x1="20" y1="0" x2="20" y2="40"/>
      <line x1="30" y1="0" x2="30" y2="40"/>
    </g>
    <!-- Swimmer silhouette (freestyle stroke) -->
    <g fill="white" transform="translate(20,17) scale(0.85)">
      <!-- Head -->
      <circle cx="-8" cy="-2" r="2.8"/>
      <!-- Torso -->
      <ellipse cx="1" cy="0" rx="7" ry="2.2" transform="rotate(-8 1 0)"/>
      <!-- Leading arm (stretched forward) -->
      <path d="M-4,-1.5 Q-9,-5 -14,-3" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <!-- Trailing arm (recovery above water) -->
      <path d="M5,-1 Q8,-7 12,-5" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <!-- Legs -->
      <path d="M7,1 L13,3.5" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <path d="M7,0.5 L13,-0.5" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Water ripple below swimmer -->
    <path d="M5 24 Q10 21.5, 15 24 Q20 26.5, 25 24 Q30 21.5, 35 24" stroke="#90E0EF" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Lower wave -->
    <path d="M2 29 Q8 26, 14 29 Q20 32, 26 29 Q32 26, 38 29" stroke="#CAF0F8" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.35"/>
  </g>
</svg>
